name: DataDash QA Playwright

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  qa-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Playwright - 21f2000858@ds.study.iitm.ac.in
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Run QA Scraper and Print Total
        run: node scraper.js
